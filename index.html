<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEX Reaction Trainer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f5f5f4;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 16px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: #1a1a1a;
  }
  .header p {
    font-size: 13px;
    color: #888;
    margin-top: 3px;
  }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 99px;
    font-size: 12px;
    background: #fff;
    border: 1px solid #e5e5e5;
    color: #888;
    margin-bottom: 24px;
  }
  .status-pill.connected { color: #16a34a; border-color: #bbf7d0; background: #f0fdf4; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #ccc; }
  .status-pill.connected .dot { background: #16a34a; }

  .box {
    width: 100%;
    max-width: 440px;
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .box-header {
    padding: 12px 18px;
    border-bottom: 1px solid #f0f0f0;
    font-size: 11px;
    font-weight: 500;
    color: #aaa;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
  }

  /* Calib grid */
  .calib-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .calib-cell {
    padding: 11px 16px;
    border-bottom: 1px solid #f5f5f5;
    border-right: 1px solid #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
  }
  .calib-cell:nth-child(2n) { border-right: none; }
  .calib-cell:nth-last-child(-n+2) { border-bottom: none; }
  .calib-cell.assigned { background: #f0fdf4; }
  .calib-cell.waiting { background: #fffbeb; }
  .calib-name { color: #333; }
  .calib-tag {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 4px;
    background: #f5f5f5;
    color: #888;
  }
  .calib-cell.assigned .calib-tag { background: #dcfce7; color: #16a34a; }
  .calib-cell.waiting .calib-tag { background: #fef9c3; color: #ca8a04; }

  .live-bar {
    padding: 11px 18px;
    font-size: 12px;
    color: #aaa;
    border-top: 1px solid #f0f0f0;
    min-height: 38px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .live-tag {
    padding: 2px 8px;
    background: #fee2e2;
    color: #dc2626;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }

  /* Prompt area */
  .prompt-area {
    padding: 48px 24px;
    text-align: center;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .prompt-label { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; }
  .prompt-action { font-size: 36px; font-weight: 600; letter-spacing: -0.02em; color: #1a1a1a; }
  .prompt-btn {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 6px;
    background: #1a1a1a;
    color: #fff;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .prompt-count { font-size: 72px; font-weight: 600; color: #f59e0b; letter-spacing: -0.04em; }
  .prompt-go { font-size: 64px; font-weight: 700; color: #16a34a; letter-spacing: -0.04em; }
  .prompt-time { font-size: 56px; font-weight: 600; letter-spacing: -0.03em; }
  .prompt-rating { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 0.1em; margin-top: -4px; }

  .progress-row {
    padding: 12px 18px;
    border-top: 1px solid #f0f0f0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .progress-track { flex: 1; height: 3px; background: #f0f0f0; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #1a1a1a; border-radius: 2px; transition: width 0.35s ease; }
  .progress-label { font-size: 11px; color: #bbb; white-space: nowrap; }

  /* Buttons */
  .btn-row { display: flex; gap: 8px; max-width: 440px; width: 100%; margin-bottom: 12px; }
  button {
    flex: 1;
    padding: 11px 0;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    border: 1px solid #e5e5e5;
    background: #fff;
    color: #333;
    transition: background 0.15s, color 0.15s;
  }
  button.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  button.primary:hover { background: #333; }
  button:not(.primary):hover { background: #f5f5f4; }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  button:disabled:hover { background: #fff; }

  /* Results */
  #results-box { display: none; }
  #results-box.visible { display: block; }

  .result-row {
    display: flex;
    align-items: center;
    padding: 10px 18px;
    border-bottom: 1px solid #f5f5f5;
    gap: 10px;
    font-size: 13px;
  }
  .result-row:last-child { border-bottom: none; }
  .r-name { flex: 1; color: #333; }
  .r-vex { font-size: 11px; color: #bbb; font-weight: 500; min-width: 28px; text-align: center; }
  .r-time { font-weight: 600; font-size: 14px; min-width: 56px; text-align: right; }
  .r-bar-wrap { width: 60px; height: 3px; background: #f0f0f0; border-radius: 2px; overflow: hidden; }
  .r-bar { height: 100%; border-radius: 2px; }

  .summary-row {
    display: flex;
    justify-content: space-around;
    padding: 16px 18px;
    border-top: 1px solid #f0f0f0;
  }
  .stat { text-align: center; }
  .stat-val { font-size: 20px; font-weight: 600; color: #1a1a1a; }
  .stat-label { font-size: 11px; color: #bbb; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }

  #screen-train { display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>Reaction Trainer</h1>
  <p>VEX · 30000S</p>
</div>

<div class="status-pill" id="ctrl-status">
  <div class="dot"></div>
  <span id="ctrl-text">No controller</span>
</div>

<!-- CALIBRATION -->
<div id="screen-calib">
  <div class="box">
    <div class="box-header">
      <span>Calibrate buttons</span>
      <span id="calib-count">0 / 10</span>
    </div>
    <div class="calib-grid" id="calib-grid"></div>
    <div class="live-bar" id="live-bar">Press any button to see its index...</div>
  </div>

  <div class="btn-row">
    <button class="primary" id="calib-btn" onclick="startCalib()" disabled>Calibrate</button>
    <button onclick="skipCalib()">Use keyboard</button>
  </div>
</div>

<!-- TRAINING -->
<div id="screen-train">
  <div class="box">
    <div class="box-header">
      <span>Drill</span>
      <span id="drill-counter">0 / 10</span>
    </div>
    <div class="prompt-area" id="prompt-area">
      <div class="prompt-label">Ready</div>
    </div>
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <span class="progress-label" id="progress-text">0%</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="primary" id="start-btn" onclick="startTrainer()">Start</button>
    <button onclick="goToCalib()">Recalibrate</button>
  </div>

  <div class="box" id="results-box">
    <div class="box-header"><span>Results</span><span id="accuracy-label"></span></div>
    <div id="results-list"></div>
    <div class="summary-row">
      <div class="stat"><div class="stat-val" id="avg-time">—</div><div class="stat-label">Avg</div></div>
      <div class="stat"><div class="stat-val" id="best-time">—</div><div class="stat-label">Best</div></div>
      <div class="stat"><div class="stat-val" id="worst-time">—</div><div class="stat-label">Slowest</div></div>
    </div>
  </div>
</div>

<script>
const BUTTONS = [
  { action: "Scoring",             vex: "R2", kb: "2" },
  { action: "Low Goal / Outtake",  vex: "L2", kb: "1" },
  { action: "Intake",              vex: "R1", kb: "e" },
  { action: "Middle Goal",         vex: "L1", kb: "q" },
  { action: "Matchloader",         vex: "Y",  kb: "y" },
  { action: "X",                   vex: "X",  kb: "x" },
  { action: "A",                   vex: "A",  kb: "a" },
  { action: "B",                   vex: "B",  kb: "b" },
  { action: "Wing",                vex: "▶",  kb: "ArrowRight" },
  { action: "Descore",             vex: "▼",  kb: "ArrowDown" },
];

const calibrated = {};
let calibTarget = null;
let calibQueue = [];
let useController = false;
let pollTimer = null;
let kbListener = null;
let prevSnapshot = null;
let results = [];
let currentIdx = 0;
let startTime = 0;

function getGamepad() {
  const pads = navigator.getGamepads ? navigator.getGamepads() : [];
  for (const p of pads) if (p && p.connected) return p;
  return null;
}

function updateStatus() {
  const el = document.getElementById('ctrl-status');
  const txt = document.getElementById('ctrl-text');
  const btn = document.getElementById('calib-btn');
  const pad = getGamepad();
  if (pad) {
    el.className = 'status-pill connected';
    txt.textContent = 'Controller connected';
    useController = true;
    if (btn) btn.disabled = false;
  } else {
    el.className = 'status-pill';
    txt.textContent = 'No controller';
    useController = false;
    if (btn) btn.disabled = true;
  }
}
window.addEventListener('gamepadconnected', () => setTimeout(updateStatus, 200));
window.addEventListener('gamepaddisconnected', updateStatus);
setInterval(updateStatus, 1000);

// Build grid
function buildGrid() {
  const grid = document.getElementById('calib-grid');
  grid.innerHTML = '';
  BUTTONS.forEach((b, i) => {
    const cell = document.createElement('div');
    cell.className = 'calib-cell';
    cell.id = `cc-${i}`;
    cell.innerHTML = `<span class="calib-name">${b.action}</span><span class="calib-tag" id="ct-${i}">${b.vex}</span>`;
    grid.appendChild(cell);
  });
}
buildGrid();
updateStatus();

// Live display
let liveInterval = null;
function startLive() {
  clearInterval(liveInterval);
  liveInterval = setInterval(() => {
    const pad = getGamepad();
    const bar = document.getElementById('live-bar');
    if (!pad) { bar.textContent = 'No controller connected.'; return; }
    const active = [];
    pad.buttons.forEach((b, i) => { if (b.pressed) active.push(`btn ${i}`); });
    pad.axes.forEach((v, i) => { if (Math.abs(v) > 0.3) active.push(`axis ${i} (${v.toFixed(2)})`); });
    if (active.length) {
      bar.innerHTML = active.map(a => `<span class="live-tag">${a}</span>`).join('');
    } else {
      bar.textContent = 'Press any button to see its index...';
    }
  }, 50);
}
startLive();

function startCalib() {
  calibQueue = BUTTONS.map((_, i) => i);
  Object.keys(calibrated).forEach(k => delete calibrated[k]);
  BUTTONS.forEach((_, i) => {
    document.getElementById(`cc-${i}`).className = 'calib-cell';
    document.getElementById(`ct-${i}`).textContent = BUTTONS[i].vex;
  });
  document.getElementById('calib-count').textContent = `0 / ${BUTTONS.length}`;
  nextCalib();
}

function nextCalib() {
  if (!calibQueue.length) { calibDone(); return; }
  calibTarget = calibQueue.shift();
  const btn = BUTTONS[calibTarget];
  document.getElementById('live-bar').innerHTML = `<span style="color:#ca8a04;font-weight:500">Press ${btn.vex} (${btn.action})...</span>`;
  document.getElementById(`cc-${calibTarget}`).className = 'calib-cell waiting';
  document.getElementById(`ct-${calibTarget}`).textContent = '...';
  const pad = getGamepad();
  prevSnapshot = pad ? snap(pad) : null;
  clearInterval(pollTimer);
  pollTimer = setInterval(detectPress, 30);
}

function snap(pad) {
  return { buttons: pad.buttons.map(b => b.pressed), axes: pad.axes.map(v => v) };
}

function detectPress() {
  const pad = getGamepad();
  if (!pad) return;
  const s = snap(pad);
  if (!prevSnapshot) { prevSnapshot = s; return; }
  for (let i = 0; i < s.buttons.length; i++) {
    if (s.buttons[i] && !prevSnapshot.buttons[i]) {
      assign(calibTarget, { type: 'button', idx: i });
      return;
    }
  }
  for (let i = 0; i < s.axes.length; i++) {
    if (Math.abs(s.axes[i]) > 0.5 && Math.abs(prevSnapshot.axes[i]) < 0.2) {
      assign(calibTarget, { type: 'axis', idx: i, thresh: 0.3 });
      return;
    }
  }
  prevSnapshot = s;
}

function assign(i, mapping) {
  clearInterval(pollTimer);
  calibrated[i] = mapping;
  const label = mapping.type === 'button' ? `btn ${mapping.idx}` : `axis ${mapping.idx}`;
  document.getElementById(`ct-${i}`).textContent = label;
  document.getElementById(`cc-${i}`).className = 'calib-cell assigned';
  document.getElementById('calib-count').textContent = `${Object.keys(calibrated).length} / ${BUTTONS.length}`;
  setTimeout(nextCalib, 250);
}

function calibDone() {
  clearInterval(liveInterval);
  document.getElementById('live-bar').innerHTML = `<span style="color:#16a34a;font-weight:500">All mapped — ready to train.</span>`;
  goToTrain();
}

function skipCalib() {
  clearInterval(pollTimer);
  clearInterval(liveInterval);
  useController = false;
  goToTrain();
}

function goToTrain() {
  document.getElementById('screen-calib').style.display = 'none';
  document.getElementById('screen-train').style.display = 'block';
}

function goToCalib() {
  document.getElementById('screen-calib').style.display = 'block';
  document.getElementById('screen-train').style.display = 'none';
  startLive();
}

// ── Trainer ─────────────────────────────────────────────────────
const TOTAL_DRILLS = 10;

function startTrainer() {
  results = [];
  currentIdx = 0;
  document.getElementById('results-box').classList.remove('visible');
  document.getElementById('start-btn').textContent = 'Start';
  runNext();
}

function runNext() {
  if (currentIdx >= TOTAL_DRILLS) { showResults(); return; }
  updateProgress();
  document.getElementById('prompt-area').innerHTML = '';
  const randomBtn = BUTTONS[Math.floor(Math.random() * BUTTONS.length)];
  setTimeout(() => countdown(randomBtn, 3), 300);
}

function countdown(btn, n) {
  const area = document.getElementById('prompt-area');
  if (n > 0) {
    area.innerHTML = `<div class="prompt-count">${n}</div>`;
    setTimeout(() => countdown(btn, n - 1), 700);
  } else {
    area.innerHTML = `<div class="prompt-action" style="font-size:36px;font-weight:600;letter-spacing:-0.02em">${btn.action}</div>`;
    startTime = performance.now();
    const btnIdx = BUTTONS.indexOf(btn);
    const m = calibrated[btnIdx];
    if (useController && m) pollResult(m, btn);
    else listenKey(btn);
  }
}

function pollResult(m, btn) {
  clearInterval(pollTimer);
  let grace = true;
  setTimeout(() => { grace = false; }, 80);
  pollTimer = setInterval(() => {
    if (grace) return;
    const pad = getGamepad();
    if (!pad) { clearInterval(pollTimer); listenKey(btn); return; }
    const hit = m.type === 'button'
      ? pad.buttons[m.idx]?.pressed
      : pad.axes[m.idx] !== undefined && pad.axes[m.idx] > m.thresh;
    if (hit) { clearInterval(pollTimer); record(btn); }
  }, 8);
}

function listenKey(btn) {
  if (kbListener) document.removeEventListener('keydown', kbListener);
  let grace = true;
  setTimeout(() => { grace = false; }, 80);
  kbListener = (e) => {
    if (grace) return;
    e.preventDefault();
    record(btn);
  };
  document.addEventListener('keydown', kbListener, { once: true });
}

function record(btn) {
  const elapsed = (performance.now() - startTime) / 1000;
  results.push({ action: btn.action, vex: btn.vex, time: elapsed });

  const color = elapsed < 0.25 ? '#16a34a' : elapsed < 0.4 ? '#ca8a04' : '#dc2626';
  const rating = elapsed < 0.25 ? 'Fast' : elapsed < 0.4 ? 'Okay' : 'Slow';
  document.getElementById('prompt-area').innerHTML = `
    <div class="prompt-label">${btn.action}</div>
    <div class="prompt-time" style="color:${color}">${elapsed.toFixed(3)}s</div>
    <div class="prompt-rating">${rating}</div>
  `;

  setTimeout(() => { currentIdx++; runNext(); }, 1100);
}

function updateProgress() {
  const pct = Math.round((currentIdx / TOTAL_DRILLS) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${currentIdx} / ${TOTAL_DRILLS}`;
  document.getElementById('drill-counter').textContent = `${currentIdx} / ${TOTAL_DRILLS}`;
}

function showResults() {
  updateProgress();
  document.getElementById('start-btn').textContent = 'Again';
  document.getElementById('prompt-area').innerHTML = `<div class="prompt-label" style="font-size:14px;color:#1a1a1a;font-weight:500">Done</div>`;

  const avg = results.reduce((a, r) => a + r.time, 0) / results.length;
  const best = Math.min(...results.map(r => r.time));
  const worst = Math.max(...results.map(r => r.time));
  document.getElementById('avg-time').textContent = avg.toFixed(3);
  document.getElementById('best-time').textContent = best.toFixed(3);
  document.getElementById('worst-time').textContent = worst.toFixed(3);
  document.getElementById('accuracy-label').textContent = `${results.length} drills`;

  document.getElementById('results-list').innerHTML = [...results]
    .sort((a, b) => a.time - b.time)
    .map(r => {
      const pct = Math.min(100, (r.time / worst) * 100);
      const color = r.time < 0.25 ? '#16a34a' : r.time < 0.4 ? '#ca8a04' : '#dc2626';
      return `<div class="result-row">
        <span class="r-name">${r.action}</span>
        <span class="r-vex">${r.vex}</span>
        <span class="r-time" style="color:${color}">${r.time.toFixed(3)}s</span>
        <div class="r-bar-wrap"><div class="r-bar" style="width:${pct}%;background:${color}"></div></div>
      </div>`;
    }).join('');

  document.getElementById('results-box').classList.add('visible');
}
</script>
</body>
</html>
